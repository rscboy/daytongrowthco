<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Set Password</title>
    <meta name="robots" content="noindex" />
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 40px; }
      .box { max-width: 560px; margin: 0 auto; }
      .hint { color: #555; line-height: 1.5; }
      .btn { display: inline-block; padding: 10px 14px; border-radius: 10px; background: #2563eb; color: white; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Finish Account Setup</h1>
      <p class="hint">
        If you opened an invite link, this page will pop up the password/setup window.
        If nothing pops up, click the button below.
      </p>
      <p><a class="btn" href="#" id="open">Open login</a></p>
    </div>

   <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  // Open the Identity modal and, if there's an invite token, switch to the right flow.
  function openIdentity() {
    if (!window.netlifyIdentity) return;

    // If arriving via Netlify invite link (#invite_token=...), open the modal.
    window.netlifyIdentity.open();

    // Small delay helps the modal render before we attempt anything else.
    setTimeout(() => {
      // If the widget supports it, this ensures we’re not stuck on a plain login view.
      // (Some versions will automatically detect the invite token once opened.)
      window.netlifyIdentity.refresh && window.netlifyIdentity.refresh();
    }, 300);
  }

  // Auto-open if invite token is present
  if (window.location.hash && window.location.hash.includes("invite_token")) {
    setTimeout(openIdentity, 300);
  }

  // Button fallback
  document.getElementById("open").addEventListener("click", function(e) {
    e.preventDefault();
    openIdentity();
  });

  // After login, go to CMS
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("login", function() {
      window.location.href = "/admin/";
    });
  }
</script>
  </body>
</html>
